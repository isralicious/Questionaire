<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Zimmergren – Trading Questionnaire</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e17;
    --bg2: #111827;
    --card: rgba(255,255,255,0.035);
    --card-border: rgba(255,255,255,0.07);
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.25);
    --accent-light: #818cf8;
    --green: #34d399;
    --text: #e2e8f0;
    --muted: #64748b;
    --dim: #334155;
    --input-bg: rgba(255,255,255,0.04);
    --input-border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 640px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 28px; }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-light);
    background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2);
    padding: 4px 14px; border-radius: 100px; margin-bottom: 14px;
  }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .header p { color: var(--muted); font-size: 14px; font-style: italic; }

  /* Progress */
  .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .progress-track {
    flex: 1; height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 4px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px; transition: width 0.4s ease; width: 0%;
  }
  .progress-label { font-size: 12px; color: var(--muted); min-width: 60px; text-align: right; }

  /* Section pills */
  .section-pills { display: flex; gap: 4px; margin-bottom: 24px; flex-wrap: wrap; }
  .pill {
    padding: 5px 10px; font-size: 11px; font-weight: 600; border-radius: 6px;
    border: none; cursor: pointer; font-family: inherit; transition: all 0.2s;
    background: rgba(255,255,255,0.06); color: var(--muted);
  }
  .pill.active { background: var(--accent); color: #fff; }

  /* Section title */
  .section-title { color: var(--accent-light); font-size: 18px; font-weight: 600; margin-bottom: 20px; }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 20px 22px; margin-bottom: 16px;
  }
  .card .question-text {
    font-size: 15px; font-weight: 500; margin-bottom: 12px; line-height: 1.5;
  }

  /* Inputs */
  input[type="text"], textarea {
    width: 100%; padding: 12px 14px; font-size: 14px; color: var(--text);
    background: var(--input-bg); border: 1px solid var(--input-border);
    border-radius: 8px; outline: none; font-family: inherit;
  }
  textarea { min-height: 80px; resize: vertical; }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }

  /* Scale buttons */
  .scale-wrap { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .scale-btn {
    width: 40px; height: 40px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    border: 1.5px solid var(--input-border); background: var(--input-bg); color: var(--muted);
  }
  .scale-btn.selected {
    border-color: var(--accent); background: var(--accent-glow); color: #fff;
  }

  /* Radio options */
  .options-wrap { display: flex; flex-direction: column; gap: 6px; }
  .option-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px;
    text-align: left; transition: all 0.15s;
    border: 1.5px solid var(--input-border); background: var(--input-bg); color: var(--muted);
  }
  .option-btn.selected {
    border-color: var(--accent); background: var(--accent-glow); color: var(--text);
  }
  .option-radio {
    width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--input-border); background: transparent;
  }
  .option-btn.selected .option-radio {
    border-color: var(--accent); background: var(--accent);
  }

  /* Navigation */
  .nav-row { display: flex; justify-content: space-between; margin-top: 28px; padding-bottom: 40px; }
  .btn-primary {
    padding: 12px 28px; font-size: 14px; font-weight: 600; color: #fff;
    background: var(--accent); border: none; border-radius: 10px;
    cursor: pointer; font-family: inherit;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary {
    padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--muted);
    background: transparent; border: 1px solid var(--input-border);
    border-radius: 10px; cursor: pointer; font-family: inherit;
  }
  .btn-secondary:hover { border-color: var(--muted); }
  .btn-submit {
    padding: 12px 32px; font-size: 14px; font-weight: 600; color: #0f172a;
    background: linear-gradient(135deg, var(--green), var(--accent-light));
    border: none; border-radius: 10px; cursor: pointer; font-family: inherit;
  }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Success */
  .success-wrap { max-width: 500px; margin: 80px auto; text-align: center; }
  .success-circle {
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, var(--green), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700; color: #fff; margin: 0 auto 18px;
  }

  .hidden { display: none !important; }

  /* Loading overlay */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .loading-overlay .spinner {
    width: 40px; height: 40px; border: 3px solid var(--dim);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <div class="badge">Trading Questionnaire</div>
    <h1>Marcus Zimmergren</h1>
    <p>For the most successful guidance</p>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    <span class="progress-label" id="progressLabel">Section 1/8</span>
  </div>

  <!-- Section pills -->
  <div class="section-pills" id="pills"></div>

  <!-- Section title -->
  <h2 class="section-title" id="sectionTitle"></h2>

  <!-- Questions container -->
  <div id="questionsContainer"></div>

  <!-- Navigation -->
  <div class="nav-row">
    <button class="btn-secondary" id="btnBack" onclick="prevSection()">← Back</button>
    <button class="btn-primary" id="btnNext" onclick="nextSection()">Next →</button>
    <button class="btn-submit hidden" id="btnSubmit" onclick="submitForm()">Submit Questionnaire</button>
  </div>
</div>

<!-- Success screen -->
<div class="success-wrap hidden" id="successScreen">
  <div class="success-circle">✓</div>
  <h2 style="margin-bottom:8px;font-size:22px">Thank you!</h2>
  <p style="color:var(--muted);margin-bottom:24px;font-size:14px">
    Your questionnaire has been submitted successfully. Marcus will review your answers soon.
  </p>
  <button class="btn-secondary" onclick="resetForm()">Submit another response</button>
</div>

<!-- Loading overlay -->
<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// CONFIGURATION — Replace this URL with your Google Apps Script Web App URL
// ══════════════════════════════════════════════════════════════════════════════
const GOOGLE_SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";
// ══════════════════════════════════════════════════════════════════════════════

const sections = [
  {
    title: "Part 1 – Background",
    questions: [
      { id: "1_1", q: "How long have you been involved in trading (in any market)?", type: "short" },
      { id: "1_2", q: "Which markets have you traded in? (You can select multiple)", type: "short" },
      { id: "1_3", q: "Have you already traded crypto futures in the past?", type: "short" },
      { id: "1_4", q: "Roughly how many hours per week do you invest in trading or learning about trading?", type: "short" },
      { id: "1_5", q: "How have you learned trading up until today?", type: "long" },
      { id: "1_6", q: "Who did you learn from, or which traders/content creators do you follow (if any)?", type: "short" },
      { id: "1_7", q: "Have you ever blown a trading account (lost a large portion or everything)?", type: "short" },
    ],
  },
  {
    title: "Part 2 – Technical Knowledge",
    questions: [
      { id: "2_1", q: "Explain in your own words what leverage is.", type: "long" },
      { id: "2_2", q: "What is liquidation and what happens when a trade gets liquidated?", type: "long" },
      { id: "2_3", q: "What is Funding Rate in futures?", type: "long" },
      { id: "2_4", q: "What tools do you use for chart analysis?", type: "long" },
      { id: "2_5", q: "How well do you understand market structure?", type: "scale" },
      { id: "2_6", q: "Which types of orders do you know or use?", type: "single",
        options: ["Market","Limit","Stop Loss","Take Profit","Stop Limit","Trailing Stop","Stop Market","OCO","Not sure"] },
      { id: "2_7", q: "Which of the following increases the chance of liquidation?", type: "single",
        options: ["High leverage","Large position size","No stop loss","Adding to a losing position","Low leverage","Other"] },
      { id: "2_8", q: "Do you have fixed risk management rules?", type: "short" },
    ],
  },
  {
    title: "Part 3 – How You Actually Trade",
    questions: [
      { id: "3_1", q: "How do you usually decide to enter a trade?", type: "long" },
      { id: "3_2", q: "Do you trade based on a specific strategy or more by feel/intuition?", type: "long" },
      { id: "3_3", q: "Do you set a stop loss before entering a trade?", type: "long" },
      { id: "3_4", q: "Do you set a take profit before entering a trade?", type: "long" },
      { id: "3_5", q: "Roughly what percentage of your account do you risk on a single trade?", type: "long" },
      { id: "3_6", q: "What do you usually do when a trade goes against you?", type: "long" },
      { id: "3_7", q: "Do you keep a Trading Journal?", type: "long" },
    ],
  },
  {
    title: "Part 4 – Psychology & Discipline",
    questions: [
      { id: "4_1", q: "How do you feel after losing a trade?", type: "long" },
      { id: "4_2", q: 'Have you ever made a "revenge trade" after a loss?', type: "long" },
      { id: "4_3", q: "Do you suffer from FOMO (fear of missing out on trades)?", type: "long" },
      { id: "4_4", q: "What is the hardest thing for you in trading?", type: "single",
        options: ["Accepting a loss","Letting profits run","Finding a trade","Being consistent","Managing risk","Not overtrading","Following a plan and strategy","Other"] },
      { id: "4_5", q: "When a trade of yours is in profit, what do you usually do?", type: "long" },
      { id: "4_6", q: "What do you think is your biggest mental weakness in trading?", type: "long" },
    ],
  },
  {
    title: "Part 5 – Goals & Expectations",
    questions: [
      { id: "5_1", q: "Why do you want to be a trader?", type: "long" },
      { id: "5_2", q: "Why do you want to learn crypto futures?", type: "long" },
      { id: "5_3", q: "What is your financial goal from trading?", type: "single",
        options: ["Side income","Replace my job","Build wealth","Quick profits","Learn the field","Other"] },
      { id: "5_4", q: "How much time per week can you actually invest in learning and trading?", type: "long" },
      { id: "5_5", q: "What do you expect from the mentorship with me?", type: "long" },
      { id: "5_6", q: "How do you prefer to learn?", type: "long" },
    ],
  },
  {
    title: "Part 6 – Self-Awareness",
    questions: [
      { id: "6_1", q: "Describe your strategy (if you have one).", type: "long" },
      { id: "6_2", q: "What do you think is your edge in the market, if you have one?", type: "long" },
      { id: "6_3", q: "Describe your last trade in detail: Why did you enter, where did you enter, where was the stop, where was the take profit, position size, what was the result, what did you do well, what did you do poorly?", type: "long" },
      { id: "6_4", q: "If I look at your trade history, what recurring mistakes do you think I'd notice?", type: "long" },
    ],
  },
  {
    title: "Part 7 – Scenario Questions (Very Important)",
    questions: [
      { id: "7_1", q: "You entered a long position and the price drops almost to your stop. What do you do?", type: "single",
        options: ["Close early","Let the stop get hit","Move the stop","Add to the position","Close and flip to short","Remove the stop entirely"] },
      { id: "7_1b", q: "Explain your answer:", type: "long" },
      { id: "7_2", q: "The price consolidates below resistance for a long time and then breaks out strongly upward. What do you do?", type: "single",
        options: ["Enter immediately","Wait for a retest","Wait for candle close","Don't enter"] },
      { id: "7_2b", q: "Explain your answer:", type: "long" },
      { id: "7_3", q: "You opened a trade with high leverage (e.g. 20x) and the price moves 2% against you. What do you do?", type: "long" },
      { id: "7_4", q: "Bitcoin jumps 5% in a few minutes because of news. What is your reaction?", type: "single",
        options: ["Jump straight into a trade","Wait for things to calm down and form a strategic setup","Switch to a lower timeframe","Don't trade in such conditions"] },
      { id: "7_4b", q: "Explain:", type: "long" },
    ],
  },
  {
    title: "Part 8 – Self-Rating (1–10)",
    questions: [
      { id: "8_1", q: "Risk Management", type: "scale" },
      { id: "8_2", q: "Discipline", type: "scale" },
      { id: "8_3", q: "Emotional Control", type: "scale" },
      { id: "8_4", q: "Strategy", type: "scale" },
      { id: "8_5", q: "Technical Analysis", type: "scale" },
      { id: "8_6", q: "Fundamental Understanding", type: "scale" },
      { id: "8_7", q: "Entries & Exits", type: "scale" },
      { id: "8_8", q: "Position Management", type: "scale" },
      { id: "8_9", q: "Trade Journal & Documentation", type: "scale" },
      { id: "8_10", q: "Overall Level as a Trader", type: "scale" },
      { id: "8_11", q: "What type of trader do you want to be?", type: "long" },
      { id: "8_12", q: "Last question — what do you think is the main thing preventing you from being a profitable trader right now?", type: "long" },
    ],
  },
];

let currentSection = 0;
const answers = {};

function init() {
  renderPills();
  renderSection();
  updateProgress();
}

function renderPills() {
  const el = document.getElementById("pills");
  el.innerHTML = "";
  sections.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "pill" + (i === currentSection ? " active" : "");
    btn.textContent = i + 1;
    btn.onclick = () => { currentSection = i; renderSection(); updateProgress(); window.scrollTo({top:0,behavior:'smooth'}); };
    el.appendChild(btn);
  });
}

function renderSection() {
  const sec = sections[currentSection];
  document.getElementById("sectionTitle").textContent = sec.title;

  const container = document.getElementById("questionsContainer");
  container.innerHTML = "";

  sec.questions.forEach(q => {
    const card = document.createElement("div");
    card.className = "card";

    const label = document.createElement("p");
    label.className = "question-text";
    label.textContent = q.q;
    card.appendChild(label);

    if (q.type === "short") {
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "Your answer";
      input.value = answers[q.id] || "";
      input.oninput = () => { answers[q.id] = input.value; updateProgress(); };
      card.appendChild(input);
    }

    if (q.type === "long") {
      const ta = document.createElement("textarea");
      ta.placeholder = "Your answer";
      ta.rows = 3;
      ta.value = answers[q.id] || "";
      ta.oninput = () => { answers[q.id] = ta.value; updateProgress(); };
      card.appendChild(ta);
    }

    if (q.type === "scale") {
      const wrap = document.createElement("div");
      wrap.className = "scale-wrap";
      for (let n = 1; n <= 10; n++) {
        const btn = document.createElement("button");
        btn.className = "scale-btn" + (answers[q.id] === n ? " selected" : "");
        btn.textContent = n;
        btn.onclick = () => {
          answers[q.id] = n;
          wrap.querySelectorAll(".scale-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          updateProgress();
        };
        wrap.appendChild(btn);
      }
      card.appendChild(wrap);
    }

    if (q.type === "single") {
      const wrap = document.createElement("div");
      wrap.className = "options-wrap";
      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn" + (answers[q.id] === opt ? " selected" : "");
        btn.innerHTML = '<span class="option-radio"></span>' + escapeHtml(opt);
        btn.onclick = () => {
          answers[q.id] = opt;
          wrap.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          updateProgress();
        };
        wrap.appendChild(btn);
      });
      card.appendChild(wrap);
    }

    container.appendChild(card);
  });

  // Update nav buttons
  document.getElementById("btnBack").style.display = currentSection > 0 ? "" : "none";
  const isLast = currentSection === sections.length - 1;
  document.getElementById("btnNext").style.display = isLast ? "none" : "";
  document.getElementById("btnSubmit").style.display = isLast ? "" : "none";
  document.getElementById("btnSubmit").className = "btn-submit";

  renderPills();
}

function updateProgress() {
  const totalQ = sections.reduce((a, s) => a + s.questions.length, 0);
  const answered = Object.keys(answers).filter(k => answers[k] !== "" && answers[k] !== undefined).length;
  const pct = (answered / totalQ) * 100;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = "Section " + (currentSection + 1) + "/" + sections.length;
}

function nextSection() {
  if (currentSection < sections.length - 1) {
    currentSection++;
    renderSection();
    updateProgress();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

function prevSection() {
  if (currentSection > 0) {
    currentSection--;
    renderSection();
    updateProgress();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

async function submitForm() {
  const btn = document.getElementById("btnSubmit");
  btn.disabled = true;
  btn.textContent = "Submitting…";
  document.getElementById("loadingOverlay").classList.remove("hidden");

  // Flatten answers into a simple object
  const payload = { timestamp: new Date().toISOString() };
  sections.forEach(sec => {
    sec.questions.forEach(q => {
      payload[q.id] = answers[q.id] || "";
    });
  });

  try {
    if (GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL !== "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
      await fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
    }
    document.getElementById("app").classList.add("hidden");
    document.getElementById("successScreen").classList.remove("hidden");
  } catch (err) {
    console.error("Submit error:", err);
    alert("There was an error submitting. Please try again.");
    btn.disabled = false;
    btn.textContent = "Submit Questionnaire";
  }
  document.getElementById("loadingOverlay").classList.add("hidden");
}

function resetForm() {
  Object.keys(answers).forEach(k => delete answers[k]);
  currentSection = 0;
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("successScreen").classList.add("hidden");
  renderSection();
  updateProgress();
  window.scrollTo({ top: 0 });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

init();
</script>
</body>
</html>
